<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Hi, there</h1>
            <p>How can assist ?</p>
        </div>
        <div class="suggestion-cards">
            <div class="card">
                <div class="card-content">
                    <p>Design a home office setup for remote work under $500.</p>
                </div>
                <div class="card-icon blue">
                    <i class="fas fa-pencil"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="card-content">
                    <p>How can I level up my web development expertise in 2025</p>
                </div>
                <div class="card-icon green">
                    <i class="fas fa-lightbulb"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="card-content">
                    <p>Suggest some useful tools for debugging JavaScript code.</p>
                </div>
                <div class="card-icon gold">
                    <i class="fas fa-code"></i>
                </div>
            </div>
            
            <div class="card">
                <div class="card-content">
                    <p>Create a React JS component for simple todo list app.</p>
                </div>
                <div class="card-icon purple">
                    <i class="fas fa-tasks"></i>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be added here dynamically -->
        </div>
        
        <div class="chat-input-container">
            <textarea id="user-input" placeholder="Type your message here..." rows="1"></textarea>
            <div class="input-buttons">
                <button id="attach-button"><i class="fas fa-paperclip"></i></button>
                <button id="send-button"><i class="fas fa-arrow-up"></i></button>
                <button id="delete-button"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
